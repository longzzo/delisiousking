/* ── GalaxyFrame ── */
function GalaxyFrame({ children, width = 412, height = 916, color = 'titanium' }) {
  const palettes = {
    titanium: { body: 'linear-gradient(140deg, #4a4d52 0%, #2c2e31 55%, #1c1d20 100%)', ring: '#2a2c2f' },
    silverblue: { body: 'linear-gradient(140deg, #5e6a78 0%, #34404c 55%, #1f262e 100%)', ring: '#2a3340' },
    black: { body: 'linear-gradient(140deg, #2a2a2c 0%, #16161a 100%)', ring: '#101013' },
  };
  const p = palettes[color] || palettes.titanium;
  const bezel = 10;
  return (
    <div style={{
      width: width + bezel * 2, height: height + bezel * 2,
      borderRadius: 52, padding: bezel, boxSizing: 'border-box',
      background: p.body,
      boxShadow: `0 50px 80px rgba(0,0,0,0.28), 0 0 0 1px ${p.ring}, inset 0 0 0 1px rgba(255,255,255,0.06)`,
      position: 'relative',
    }}>
      <div style={{ position: 'absolute', right: -1.5, top: 180, width: 2, height: 78, background: '#1a1a1d', borderRadius: 2 }} />
      <div style={{ position: 'absolute', left: -1.5, top: 220, width: 2, height: 56, background: '#1a1a1d', borderRadius: 2 }} />
      <div style={{ position: 'absolute', left: -1.5, top: 290, width: 2, height: 96, background: '#1a1a1d', borderRadius: 2 }} />
      <div style={{ width, height, borderRadius: 44, overflow: 'hidden', position: 'relative', background: '#000' }}>
        <div style={{
          position: 'absolute', top: 14, left: '50%', transform: 'translateX(-50%)',
          width: 12, height: 12, borderRadius: '50%', background: '#000',
          boxShadow: 'inset 0 0 0 1px rgba(255,255,255,0.08), 0 0 0 1px rgba(0,0,0,0.4)',
          zIndex: 100,
        }} />
        <SamsungStatusBar />
        {children}
      </div>
    </div>
  );
}

          <path d="M7.5 5.3C9.2 5.3 10.7 6 11.8 7.1L10.4 8.5C9.6 7.7 8.6 7.2 7.5 7.2C6.4 7.2 5.4 7.7 4.6 8.5L3.2 7.1C4.3 6 5.8 5.3 7.5 5.3Z" fill="#fff"/>

/* ── NavCtx ── */

function useNav() { return React.useContext(NavCtx); }

/* ── TabBar ── */
function TabBar({ active = 'home' }) {
  const nav = useNav();
  const tabs = [
    { id: 'home', label: '홈', icon: '🏠', target: 'home' },
    { id: 'map', label: '지도', icon: '🗺️', target: 'map' },
    { id: 'wish', label: '위시', icon: '❤️', target: 'home' },
    { id: 'review', label: '리뷰', icon: '✍️', target: 'home' },
    { id: 'my', label: '마이', icon: '👤', target: 'home' },
  ];
  return (
    <div style={{ position: 'absolute', left: 0, right: 0, bottom: 0, background: 'rgba(13,11,9,0.92)', backdropFilter: 'blur(20px)', WebkitBackdropFilter: 'blur(20px)', borderTop: '1px solid rgba(255,255,255,0.06)', padding: '10px 8px 26px', display: 'flex', justifyContent: 'space-around' }}>
      {tabs.map(t => (
        <div key={t.id} onClick={() => nav.go(t.target)} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, cursor: 'pointer' }}>
          <div style={{ fontSize: 20, opacity: active === t.id ? 1 : 0.45, filter: active === t.id ? 'none' : 'grayscale(0.6)' }}>{t.icon}</div>
          <div style={{ fontSize: 10, fontWeight: 700, whiteSpace: 'nowrap', color: active === t.id ? '#FF8904' : 'rgba(255,255,255,0.5)' }}>{t.label}</div>
        </div>
      ))}
    </div>
  );
}

/* ── PrototypeApp ── */
function PrototypeApp() {
  const [screen, setScreen] = React.useState('login');
  const [showSuccess, setShowSuccess] = React.useState(false);
  const [key, setKey] = React.useState(0);
  const go = (next) => {
    if (next === 'submit') {
      setShowSuccess(true);
      setTimeout(() => { setShowSuccess(false); setScreen('detail'); setKey(k => k+1); }, 1900);
      return;
    }
    setScreen(next); setKey(k => k+1);
  };
  const ctx = React.useMemo(() => ({ go, current: screen }), [screen]);
  return (
    <NavCtx.Provider value={ctx}>
      <div style={{ width: '100%', height: '100%', position: 'relative', overflow: 'hidden' }} key={key}>
        {screen === 'login'  && <LoginScreen />}
        {screen === 'home'   && <HomeScreen active="home" />}
        {screen === 'map'    && <MapScreen />}
        {screen === 'detail' && <DetailScreen />}
        {screen === 'review' && <ReviewScreen />}
        {showSuccess && <SuccessOverlay />}
      </div>
    </NavCtx.Provider>
  );
}

/* ── DesignCanvas (simplified pan/zoom) ── */
function DesignCanvas({ children }) {
  const vpRef = React.useRef(null);
  const worldRef = React.useRef(null);
  const tf = React.useRef({ x: 60, y: 60, scale: 0.75 });

  const apply = React.useCallback(() => {
    const { x, y, scale } = tf.current;
    const el = worldRef.current;
    if (!el) return;
    el.style.transform = `translate3d(${x}px,${y}px,0) scale(${scale})`;
    el.style.setProperty('--dc-inv-zoom', String(1/scale));
  }, []);

  React.useLayoutEffect(() => { apply(); }, [apply]);

  React.useEffect(() => {
    const vp = vpRef.current;
    if (!vp) return;
    const zoomAt = (cx, cy, factor) => {
      const r = vp.getBoundingClientRect();
      const px = cx-r.left, py = cy-r.top;
      const t = tf.current;
      const next = Math.min(8, Math.max(0.1, t.scale*factor));
      const k = next/t.scale;
      t.x = px-(px-t.x)*k; t.y = py-(py-t.y)*k; t.scale = next;
      apply();
    };
    const isWheel = (e) => e.deltaMode !== 0 || (e.deltaX === 0 && Number.isInteger(e.deltaY) && Math.abs(e.deltaY) >= 40);
    const onWheel = (e) => {
      e.preventDefault();
      if (e.ctrlKey || e.metaKey) zoomAt(e.clientX, e.clientY, Math.exp(-e.deltaY*0.01));
      else if (isWheel(e)) zoomAt(e.clientX, e.clientY, Math.exp(-Math.sign(e.deltaY)*0.18));
      else { tf.current.x -= e.deltaX; tf.current.y -= e.deltaY; apply(); }
    };
    let drag = null;
    const onPD = (e) => {
      const onBg = !e.target.closest('[data-slot]');
      if (!(e.button === 1 || (e.button === 0 && onBg))) return;
      e.preventDefault(); vp.setPointerCapture(e.pointerId);
      drag = { id: e.pointerId, lx: e.clientX, ly: e.clientY }; vp.style.cursor = 'grabbing';
    };
    const onPM = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      tf.current.x += e.clientX-drag.lx; tf.current.y += e.clientY-drag.ly;
      drag.lx = e.clientX; drag.ly = e.clientY; apply();
    };
    const onPU = (e) => { if (!drag || e.pointerId !== drag.id) return; vp.releasePointerCapture(e.pointerId); drag = null; vp.style.cursor = ''; };
    vp.addEventListener('wheel', onWheel, { passive: false });
    vp.addEventListener('pointerdown', onPD);
    vp.addEventListener('pointermove', onPM);
    vp.addEventListener('pointerup', onPU);
    vp.addEventListener('pointercancel', onPU);
    return () => {
      vp.removeEventListener('wheel', onWheel);
      vp.removeEventListener('pointerdown', onPD);
      vp.removeEventListener('pointermove', onPM);
      vp.removeEventListener('pointerup', onPU);
      vp.removeEventListener('pointercancel', onPU);
    };
  }, [apply]);

  const gridSvg = `url("data:image/svg+xml,%3Csvg width='120' height='120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M120 0H0v120' fill='none' stroke='rgba(0,0,0,0.06)' stroke-width='1'/%3E%3C/svg%3E")`;
  return (
    <div ref={vpRef} style={{ height: '100vh', width: '100vw', background: '#f0eee9', overflow: 'hidden', overscrollBehavior: 'none', touchAction: 'none', position: 'relative', cursor: 'default' }}>
      <div ref={worldRef} style={{ position: 'absolute', top: 0, left: 0, transformOrigin: '0 0', willChange: 'transform', width: 'max-content' }}>
        <div style={{ position: 'absolute', inset: -6000, backgroundImage: gridSvg, backgroundSize: '120px 120px', pointerEvents: 'none', zIndex: -1 }} />
        {children}
      </div>
    </div>
  );
}

/* ── Section & Artboard ── */

      </div>
      <div style={{ display: 'flex', gap: 48, alignItems: 'flex-start', width: 'max-content' }}>{children}</div>
    </div>
  );
}

function Artboard({ label, width, height, children }) {
  return (
    <div data-slot={label} style={{ position: 'relative', flexShrink: 0 }}>
      <div style={{ position: 'absolute', bottom: '100%', left: 0, marginBottom: 8, fontSize: 13, fontWeight: 500, color: 'rgba(60,50,40,0.7)', whiteSpace: 'nowrap', fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif' }}>{label}</div>

    </div>
  );
}
