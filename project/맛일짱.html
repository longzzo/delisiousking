<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>맛일짱 · 경일대 학생 맛집 앱</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #1a1715; }
  * { -webkit-font-smoothing: antialiased; }
  @keyframes caret { 50% { opacity: 0; } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pop {
    0%   { transform: scale(0.6) rotate(-8deg); opacity: 0; }
    60%  { transform: scale(1.08) rotate(3deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  body { word-break: keep-all; }
  button { white-space: nowrap; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="galaxy-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="screens/login.jsx"></script>
<script type="text/babel" src="screens/home.jsx"></script>
<script type="text/babel" src="screens/map.jsx"></script>
<script type="text/babel" src="screens/detail.jsx"></script>
<script type="text/babel" src="screens/review.jsx"></script>
<script type="text/babel" src="screens/proto.jsx"></script>
<script type="text/babel" src="screens/workflow.jsx"></script>

<script type="text/babel" data-presets="env,react">
const W = 412, H = 916;

function App() {
  return (
    <DesignCanvas>
      <DCSection
        id="proto"
        title="▶ 인터랙티브 프로토타입"
        subtitle="Galaxy S25 Ultra 기준 · 클릭으로 전체 플로우 체험"
      >
        <DCArtboard id="prototype" label="클릭으로 체험 · 로그인 → 완료" width={W + 20} height={H + 20}>
          <GalaxyFrame width={W} height={H}>
            <PrototypeApp />
          </GalaxyFrame>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="workflow"
        title="사용자 워크플로우"
        subtitle="신입생이 점심을 정하지 못해 앱을 켜고 리뷰를 남기기까지"
      >
        <DCArtboard id="flow" label="User Flow · Galaxy S25 Ultra" width={2540} height={1280}>
          <WorkflowBoard />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="specs"
        title="화면 스펙 · 5 screens"
        subtitle="각 화면의 풀사이즈 디자인 스펙 · Galaxy S25 Ultra · Dark mode"
      >
        <DCArtboard id="login"  label="01 · 로그인 / 회원가입" width={W + 20} height={H + 20}>
          <GalaxyFrame width={W} height={H}><LoginScreen /></GalaxyFrame>
        </DCArtboard>
        <DCArtboard id="home"   label="02 · 홈" width={W + 20} height={H + 20}>
          <GalaxyFrame width={W} height={H}><HomeScreen active="home" /></GalaxyFrame>
        </DCArtboard>
        <DCArtboard id="map"    label="03 · 지도" width={W + 20} height={H + 20}>
          <GalaxyFrame width={W} height={H}><MapScreen /></GalaxyFrame>
        </DCArtboard>
        <DCArtboard id="detail" label="04 · 식당 상세" width={W + 20} height={H + 20}>
          <GalaxyFrame width={W} height={H}><DetailScreen /></GalaxyFrame>
        </DCArtboard>
        <DCArtboard id="review" label="05 · 리뷰 작성" width={W + 20} height={H + 20}>
          <GalaxyFrame width={W} height={H}><ReviewScreen /></GalaxyFrame>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
